name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: "Release: ${{ matrix.artifact }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: eve-resfile-proxy-linux-amd64
          - goos: darwin
            goarch: arm64
            artifact: eve-resfile-proxy-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact: eve-resfile-proxy-windows-amd64.exe
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w" -o dist/${{ matrix.artifact }} ./cmd/eve-resfile-proxy

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
