# Example configuration for eve-resfile-proxy.
# Start with: go run ./cmd/eve-resfile-proxy --config example-config.yaml

server: tranquility
addr: ":8080"

# Optional: pin to a specific client build (omit for latest TQ).
# build: "1234567"

# Optional: load indexes for specific platforms only.
# platforms:
#   - windows
#   - macos

# Optional: enable on-disk caching for indexes and assets.
cache: .cache

# debug: false

# Optional: Disable directory listings
# no_index: false

# Optional: load the full binaries/resources tree.
#           This moves the resources under /res/, and enables access to
#           the /app/ binaries distribution.
# Note: this will affect your paths for aliases and transforms!
# full_tree: false

# Optional: path and extension aliases for the resfile index.
# Path alias: no trailing slash for files; directory alias: trailing slash on BOTH alias and target.
# Extension alias: add match (alias/target are extensions like .webm and .png).
aliases:
  - alias: favicon.ico
    target: ui/texture/icons/icons111_07.png # Fedo is love, fedo is life.
  - alias: ui.base64/
    target: ui/
  # - alias: .webm
  #   target: .png
  #   match:
  #     path_prefix: ui/textures/icons/

# Optional: apply transforms to the resfile index.
transforms:
  - name: base64
    match:
      path_prefix: ui.base64/
    command:
      args: ["/usr/bin/base64"]
      timeout: 10s
